name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
      - main

env:
  BUN_VERSION: bun-v1.2.17
  NODE_VERSION: 22.22.0
  NPM_VERSION: 11.5.1

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'main')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "$BUN_VERSION"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Show tool versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version packages or publish
        uses: changesets/action@v1
        with:
          # This workflow runs on workflow_run with a detached HEAD checkout of
          # the already-green CI commit. Re-running changeset status here is
          # redundant with CI and can fail because branch divergence metadata is
          # unavailable in this checkout mode.
          version: npm run version-packages
          publish: npm run release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
